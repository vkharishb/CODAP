name: terraform Plan

on:
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"
  push:
    branches: ["main"]
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-plan.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_WORKING_DIR: terraform/envs/dev
  TF_STATE_KEY: dev/terraform.tfstate

jobs:
  terraform-plan:
    name: terraform Plan
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-terraform-plan-${{ github.run_id }}

      - name: Prepare terraform backend bucket
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET="codap-tfstate-${{ secrets.AWS_REGION }}-${ACCOUNT_ID}"
          echo "TF_BACKEND_BUCKET=${BUCKET}" >> "$GITHUB_ENV"

          if ! aws s3api head-bucket --bucket "${BUCKET}" 2>/dev/null; then
            if [ "${{ secrets.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "${BUCKET}" --region "${{ secrets.AWS_REGION }}"
            else
              aws s3api create-bucket \
                --bucket "${BUCKET}" \
                --region "${{ secrets.AWS_REGION }}" \
                --create-bucket-configuration LocationConstraint="${{ secrets.AWS_REGION }}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Setup terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: terraform format check
        run: terraform  fmt -check -recursive

      - name: terraform init
        run: |
          terraform -chdir=${TF_WORKING_DIR} init -reconfigure \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: terraform validate
        run: terraform -chdir=${TF_WORKING_DIR} validate

      - name: terraform plan
        run: terraform -chdir=${TF_WORKING_DIR} plan -input=false -out=tfplan

      - name: Upload terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: codap-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 5
