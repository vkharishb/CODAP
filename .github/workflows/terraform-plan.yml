name: 02 - Terraform Plan

on:
  workflow_run:
    workflows: ["01 - CODAP CI"]
    types: [completed]
    branches: ["main"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: terraform/envs/dev
  TF_STATE_KEY: dev/terraform.tfstate

jobs:
  terraform-plan:
    name: Step 02 - Terraform Plan
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Step 02.01 - Checkout source code
        uses: actions/checkout@v4

      - name: Step 02.02 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-terraform-plan
          mask-aws-account-id: true

      - name: Step 02.03 - Mask AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"

      - name: Step 02.04 - Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Step 02.05 - Prepare S3 backend bucket
        run: |
          BACKEND_BUCKET="${{ secrets.TF_BACKEND_BUCKET }}"
          if [ -z "$BACKEND_BUCKET" ]; then
            BACKEND_BUCKET="codap-tfstate-${{ secrets.AWS_REGION }}-vkharishb-codap"
          fi

          echo "::add-mask::$BACKEND_BUCKET"

          if aws s3api head-bucket --bucket "$BACKEND_BUCKET" 2>/dev/null; then
            echo "Backend bucket already exists."
          else
            if [ "${{ secrets.AWS_REGION }}" = "us-east-1" ]; then
              aws s3api create-bucket --bucket "$BACKEND_BUCKET" --region "${{ secrets.AWS_REGION }}"
            else
              aws s3api create-bucket \
                --bucket "$BACKEND_BUCKET" \
                --region "${{ secrets.AWS_REGION }}" \
                --create-bucket-configuration LocationConstraint="${{ secrets.AWS_REGION }}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BACKEND_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$BACKEND_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$BACKEND_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          echo "TF_BACKEND_BUCKET=$BACKEND_BUCKET" >> "$GITHUB_ENV"

      - name: Step 02.06 - Terraform init with S3 lockfile
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init -reconfigure \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Step 02.07 - Terraform validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Step 02.08 - Terraform plan
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} plan -out=tfplan

      - name: Step 02.09 - Upload Terraform plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: codap-tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan

      - name: Step 02.10 - Terraform plan summary
        run: |
          {
            echo "## Terraform Plan Completed"
            echo ""
            echo "- Backend: S3 with use_lockfile=true"
            echo "- Working directory: ${{ env.TF_WORKING_DIR }}"
            echo "- State key: ${{ env.TF_STATE_KEY }}"
            echo "- Plan artifact: codap-tfplan"
          } >> "$GITHUB_STEP_SUMMARY"
