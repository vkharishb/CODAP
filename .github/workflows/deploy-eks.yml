name: CODAP Deploy to EKS

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy-eks:
    name: Install ArgoCD and Deploy CODAP GitOps
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-eks-deploy-${{ github.run_id }}

      - name: Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Verify cluster access
        run: |
          kubectl get nodes -o wide
          kubectl get namespaces

      - name: Install or upgrade ArgoCD
        run: |
          kubectl create namespace argocd --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -n argocd -f https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/install.yaml
          kubectl -n argocd rollout status deployment/argocd-server --timeout=600s

      - name: Update local GitOps repo URL for this repository
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          repo_url = f"https://github.com/{os.environ['GITHUB_REPOSITORY']}.git"
          for path in Path("gitops").rglob("*.yaml"):
              text = path.read_text()
              text = text.replace("https://github.com/<your-github-username>/CODAP.git", repo_url)
              path.write_text(text)
          PY

      - name: Apply CODAP ArgoCD project and root app
        run: |
          kubectl apply -f gitops/projects/codap-project.yaml
          kubectl apply -f gitops/argocd/root-app.yaml
          kubectl -n argocd get applications

      - name: Deployment proof
        run: |
          echo "Waiting briefly for ArgoCD applications to appear..."
          sleep 30
          kubectl -n argocd get applications || true
          kubectl -n monitoring get pods,svc || true
          kubectl -n demo get pods,svc,hpa || true
          kubectl -n dora-metrics get pods,svc || true

      - name: Generate Grafana dashboard endpoint proof
        id: grafana_endpoint
        run: |
          set -euo pipefail
          mkdir -p proofs/generated

          echo "Waiting for Grafana LoadBalancer service..."
          kubectl -n monitoring rollout status deployment/observability-grafana --timeout=900s || true

          GRAFANA_HOST=""
          GRAFANA_IP=""
          for i in $(seq 1 60); do
            GRAFANA_HOST=$(kubectl -n monitoring get svc observability-grafana -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            GRAFANA_IP=$(kubectl -n monitoring get svc observability-grafana -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$GRAFANA_HOST" ] || [ -n "$GRAFANA_IP" ]; then
              break
            fi
            echo "LoadBalancer endpoint not ready yet. Attempt $i/60"
            sleep 20
          done

          ENDPOINT="${GRAFANA_HOST:-$GRAFANA_IP}"
          if [ -z "$ENDPOINT" ]; then
            echo "Grafana LoadBalancer endpoint was not created yet."
            kubectl -n monitoring get svc observability-grafana -o wide || true
            exit 1
          fi

          GRAFANA_URL="http://$ENDPOINT"
          DASHBOARD_URL="$GRAFANA_URL/d/codap-deployment-analytics/codap-dashboard?orgId=1"

          echo "grafana_url=$GRAFANA_URL" >> "$GITHUB_OUTPUT"
          echo "dashboard_url=$DASHBOARD_URL" >> "$GITHUB_OUTPUT"

          cat > proofs/generated/grafana-endpoint-proof.md <<EOF
# CODAP Grafana Dashboard Proof

Deployment completed successfully from GitHub Actions.

## Clickable Endpoints

- Grafana URL: $GRAFANA_URL
- CODAP Dashboard URL: $DASHBOARD_URL

## Login

- Username: admin
- Password source:

```bash
kubectl -n monitoring get secret observability-grafana -o jsonpath="{.data.admin-password}" | base64 -d
```

## Proof Commands

```bash
kubectl -n monitoring get pods,svc
kubectl -n argocd get applications
```

## Proof Time

- GitHub repository: $GITHUB_REPOSITORY
- GitHub run ID: $GITHUB_RUN_ID
- GitHub SHA: $GITHUB_SHA
EOF

          {
            echo "## CODAP Grafana Dashboard Proof"
            echo ""
            echo "Deployment completed successfully."
            echo ""
            echo "| Item | Link |"
            echo "|---|---|"
            echo "| Grafana | [$GRAFANA_URL]($GRAFANA_URL) |"
            echo "| CODAP Dashboard | [$DASHBOARD_URL]($DASHBOARD_URL) |"
            echo ""
            echo "**Grafana username:** admin"
            echo ""
            echo "Get password:"
            echo '```bash'
            echo 'kubectl -n monitoring get secret observability-grafana -o jsonpath="{.data.admin-password}" | base64 -d'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Grafana endpoint proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: codap-grafana-endpoint-proof
          path: proofs/generated/grafana-endpoint-proof.md
