name: 99 - Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_destroy:
        description: "Type DESTROY to confirm deletion of CODAP AWS resources"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: terraform/envs/dev
  TF_STATE_KEY: dev/terraform.tfstate
  TF_BACKEND_BUCKET: ${{ secrets.TF_BACKEND_BUCKET }}

jobs:
  terraform-destroy:
    name: Step 99 - Manual Terraform Destroy
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event.inputs.confirm_destroy == 'DESTROY' }}

    steps:
      - name: Step 99.01 - Checkout source code
        uses: actions/checkout@v4

      - name: Step 99.02 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-terraform-destroy
          mask-aws-account-id: true

      - name: Step 99.03 - Mask AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"

      - name: Step 99.04 - Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Step 99.05 - Prepare backend bucket variable
        run: |
          if [ -z "$TF_BACKEND_BUCKET" ]; then
            TF_BACKEND_BUCKET="codap-tfstate-${AWS_REGION}-vkharishb-codap"
          fi
          echo "::add-mask::$TF_BACKEND_BUCKET"
          echo "TF_BACKEND_BUCKET=$TF_BACKEND_BUCKET" >> "$GITHUB_ENV"

      - name: Step 99.06 - Terraform init with S3 lockfile
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init -reconfigure \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Step 99.07 - Terraform destroy
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} destroy -auto-approve

      - name: Step 99.08 - Destroy summary
        run: |
          {
            echo "## CODAP Terraform Destroy Completed"
            echo ""
            echo "- AWS infrastructure deletion requested"
            echo "- Check AWS Console for remaining LoadBalancers, EBS volumes, or orphaned resources"
          } >> "$GITHUB_STEP_SUMMARY"
