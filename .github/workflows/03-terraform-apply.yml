name: 03 - Terraform Apply

on:
  workflow_run:
    workflows: ["02 - Terraform Plan"]
    types: [completed]
    branches:
      - main
      - devops
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  TF_WORKING_DIR: terraform/envs/dev
  TF_STATE_KEY: dev/terraform.tfstate

jobs:
  terraform-apply:
    name: Step 03 - Terraform Apply
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Step 03.01 - Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Step 03.02 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-terraform-apply
          mask-aws-account-id: true

      - name: Step 03.03 - Mask AWS account ID
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"

      - name: Step 03.04 - Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Step 03.05 - Prepare backend bucket variable
        run: |
          BACKEND_BUCKET="${TF_BACKEND_BUCKET}"
          if [ -z "$BACKEND_BUCKET" ]; then
            BACKEND_BUCKET="codap-tfstate-${AWS_REGION}-vkharishb-codap"
          fi
          echo "::add-mask::$BACKEND_BUCKET"
          echo "TF_BACKEND_BUCKET=$BACKEND_BUCKET" >> "$GITHUB_ENV"

      - name: Step 03.06 - Terraform init with S3 lockfile
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} init -reconfigure \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Step 03.07 - Terraform validate
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} validate

      - name: Step 03.08 - Terraform apply
        run: terraform -chdir=${{ env.TF_WORKING_DIR }} apply -auto-approve

      - name: Step 03.09 - Terraform output summary
        run: |
          terraform -chdir=${{ env.TF_WORKING_DIR }} output || true
          {
            echo "## Terraform Apply Completed"
            echo ""
            echo "- EKS infrastructure apply completed"
            echo "- Next workflow: 04 - Build Security Push"
          } >> "$GITHUB_STEP_SUMMARY"
