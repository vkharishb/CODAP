name: 06 - Grafana Live

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Source commit SHA deployed by Workflow 05
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  SOURCE_SHA: ${{ inputs.source_sha || github.sha }}

jobs:
  grafana-live:
    name: Step 06 - Grafana Live Dashboard Proof
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Step 06.01 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-grafana-live
          mask-aws-account-id: true

      - name: Step 06.02 - Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Step 06.03 - Validate Grafana ClusterIP and ALB Ingress
        shell: bash
        run: |
          set -euo pipefail

          SERVICE_TYPE=$(
          kubectl -n monitoring get service observability-grafana \
          -o jsonpath='{.spec.type}')
         

          echo "Grafana Service type: $SERVICE_TYPE"

          if [[ "$SERVICE_TYPE" != "ClusterIP" ]]; then
          echo "::error::Grafana must be ClusterIP behind the ALB Ingress."
          exit 1
          fi

          kubectl -n monitoring get service observability-grafana
          kubectl -n monitoring get ingress grafana-public

      - name: Step 06.04 - Wait for Grafana ALB endpoint
        run: |
          echo "Waiting for Grafana ALB Ingress endpoint..."

          for i in {1..40}; do
            GRAFANA_HOST=$(
            kubectl -n monitoring get ingress grafana-public \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' \
              2>/dev/null || true
            )

            if [ -n "$GRAFANA_HOST" ]; then
              break
            fi

            echo "Waiting for LoadBalancer... attempt $i of 40"

             kubectl -n monitoring get ingress grafana-public \
              -o wide || true

            sleep 20
          done

          if [ -z "$GRAFANA_HOST" ]; then
             echo "::error::Grafana ALB endpoint was not created."

            kubectl -n monitoring describe ingress grafana-public || true
            kubectl -n monitoring get service observability-grafana -o wide || true
            kubectl -n monitoring get endpointslice \
              -l kubernetes.io/service-name=observability-grafana \
              -o wide || true

            exit 1

          GRAFANA_URL="http://$GRAFANA_HOST"
          DASHBOARD_URL="$GRAFANA_URL/d/codap-deployment-analytics"

          echo "GRAFANA_HOST=$GRAFANA_HOST" >> "$GITHUB_ENV"
          echo "GRAFANA_URL=$GRAFANA_URL" >> "$GITHUB_ENV"
          echo "DASHBOARD_URL=$DASHBOARD_URL" >> "$GITHUB_ENV"

          echo "Grafana URL: $GRAFANA_URL"
          echo "Dashboard URL: $DASHBOARD_URL"

      - name: Step 06.05 - Create clickable Grafana proof summary
        run: |
          {
            echo "## CODAP Grafana Dashboard Live Proof"
            echo ""
            echo "| Item | Link |"
            echo "|---|---|"
            echo "| Grafana URL | $GRAFANA_URL |"
            echo "| CODAP Dashboard URL | $DASHBOARD_URL |"
            echo ""
            echo "Take screenshot after opening the dashboard link."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Step 06.06 - Create Grafana proof artifact
        run: |
          mkdir -p proofs/generated
          {
            echo "# CODAP Grafana Endpoint Proof"
            echo ""
            echo "Grafana URL: $GRAFANA_URL"
            echo "CODAP Dashboard URL: $DASHBOARD_URL"
            echo "GitHub Run ID: $GITHUB_RUN_ID"
            echo "Commit SHA: $SOURCE_SHA"
          } > proofs/generated/grafana-endpoint-proof.md

      - name: Step 06.07 - Upload Grafana proof artifact
        uses: actions/upload-artifact@v4
        with:
          name: codap-grafana-endpoint-proof
          path: proofs/generated/grafana-endpoint-proof.md
