name: 05 - Deploy Application

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Source commit SHA used to build the container images
        required: false
        type: string
      build_run_id:
        description: Workflow 04 run ID embedded in the ECR image tag
        required: false
        type: string

permissions:
  id-token: write
  contents: read
  actions: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER_NAME }}
  DEMO_REPO: codap-demo-api
  DORA_REPO: codap-dora-metrics-service
  SOURCE_SHA: ${{ inputs.source_sha || github.sha }}
  BUILD_RUN_ID: ${{ inputs.build_run_id || github.run_id }}
  HELM_VERSION: v4.2.3
  KUBE_PROMETHEUS_STACK_VERSION: "87.15.1"

jobs:
  deploy:
    name: Step 05 - Deploy CODAP to EKS
    runs-on: ubuntu-latest
    environment: dev
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Step 05.01 - Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_sha || github.ref }}
          fetch-depth: 0

      - name: Step 05.02 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-deploy-application
          mask-aws-account-id: true

      - name: Step 05.03 - Prepare image URIs and mask account
        id: images
        run: |
          set -euo pipefail
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"

          SOURCE_SHA="${SOURCE_SHA:-$GITHUB_SHA}"
          SHORT_SHA="${SOURCE_SHA:0:12}"
          BUILD_RUN_ID="${BUILD_RUN_ID:-$GITHUB_RUN_ID}"
          IMAGE_TAG="run-${BUILD_RUN_ID}-${SHORT_SHA}"

          DEMO_IMAGE="$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.DEMO_REPO }}:$IMAGE_TAG"
          DORA_REPOSITORY="$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.DORA_REPO }}"
          DORA_IMAGE="$DORA_REPOSITORY:$IMAGE_TAG"

          echo "::add-mask::$DEMO_IMAGE"
          echo "::add-mask::$DORA_REPOSITORY"
          echo "::add-mask::$DORA_IMAGE"

          echo "SOURCE_SHA=$SOURCE_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"
          echo "DEMO_IMAGE=$DEMO_IMAGE" >> "$GITHUB_ENV"
          echo "DORA_REPOSITORY=$DORA_REPOSITORY" >> "$GITHUB_ENV"
          echo "DORA_IMAGE=$DORA_IMAGE" >> "$GITHUB_ENV"

          echo "Using image tag: $IMAGE_TAG"

      - name: Step 05.04 - Configure kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ secrets.AWS_REGION }}" \
            --name "${{ secrets.EKS_CLUSTER_NAME }}"

      - name: Step 05.05 - Verify EKS access
        run: |
          set -euo pipefail
          kubectl get nodes -o wide
          kubectl get namespaces

      - name: Step 05.06 - Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ env.HELM_VERSION }}

      - name: Step 05.07 - Add Helm repositories
        run: |
          set -euo pipefail
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

      - name: Step 05.08 - Create namespaces
        run: |
          set -euo pipefail
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace demo --dry-run=client -o yaml | kubectl apply -f -
          kubectl create namespace dora-metrics --dry-run=client -o yaml | kubectl apply -f -

      - name: Step 05.09 - Validate EBS CSI and gp3 storage
        run: |
          set -euo pipefail
          kubectl get storageclass gp3 -o wide
          kubectl -n kube-system rollout status deployment/ebs-csi-controller --timeout=5m
          kubectl -n kube-system get pods -l app.kubernetes.io/name=aws-ebs-csi-driver -o wide

      - name: Step 05.10 - Clean only failed or pending observability release
        run: |
          set -euo pipefail
          if ! helm -n monitoring status observability >/dev/null 2>&1; then
            echo "No existing observability release."
            exit 0
          fi

          RELEASE_STATUS=$(helm -n monitoring status observability -o json | jq -r '.info.status')
          echo "Existing observability release status: $RELEASE_STATUS"

          case "$RELEASE_STATUS" in
            failed|pending-install|pending-upgrade|pending-rollback|uninstalling)
              helm -n monitoring uninstall observability --wait --timeout 5m
              ;;
            *)
              echo "Release is healthy enough for an in-place Helm upgrade."
              ;;
          esac

      - name: Step 05.11 - Apply Grafana dashboard ConfigMap
        run: |
          set -euo pipefail
          kubectl apply -f gitops/manifests/observability-dashboards

      - name: Step 05.12 - Deploy Prometheus and Grafana observability stack
        run: |
          set -euo pipefail
          helm upgrade --install observability prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --version "$KUBE_PROMETHEUS_STACK_VERSION" \
            --values observability/values-dev.yaml \
            --history-max 5 \
            --wait \
            --timeout 20m

          kubectl -n monitoring rollout status deployment/observability-grafana --timeout=5m

      - name: Step 05.13 - Deploy DORA metrics service
        run: |
          set -euo pipefail
          helm upgrade --install dora-metrics-service dora-metrics-service/chart \
            --namespace dora-metrics \
            --set image.repository="$DORA_REPOSITORY" \
            --set image.tag="$IMAGE_TAG" \
            --history-max 5 \
            --wait \
            --timeout 10m
          kubectl -n dora-metrics rollout status deployment/dora-metrics-service --timeout=5m

      - name: Step 05.14 - Deploy demo application
        run: |
          set -euo pipefail

          # Apply only the namespace/RBAC and the single canonical workload file.
          # Do not use a directory wildcard here: a legacy manifest previously
          # declared the same Deployment and Service with a different selector.
          kubectl apply -f gitops/manifests/demo/namespace-rbac.yaml

          WORK_DIR=$(mktemp -d)
          trap 'rm -rf "$WORK_DIR"' EXIT
          RENDERED_MANIFEST="$WORK_DIR/demo-api.yaml"
          cp gitops/manifests/demo/demo-api.yaml "$RENDERED_MANIFEST"
          sed -i -E \
            "s|^([[:space:]]*)image:[[:space:]]+codap-demo-api:[^[:space:]]+|\\1image: $DEMO_IMAGE|" \
            "$RENDERED_MANIFEST"

          if ! grep -Fq "image: $DEMO_IMAGE" "$RENDERED_MANIFEST"; then
            echo "::error::Failed to render DEMO_IMAGE into $RENDERED_MANIFEST"
            exit 1
          fi

          # spec.selector is immutable. Normally the desired selector is already
          # app=demo-api. This guard safely recreates only a mismatched legacy
          # Deployment from another revision/environment.
          DESIRED_SELECTOR='{"app":"demo-api"}'
          if kubectl -n demo get deployment demo-api >/dev/null 2>&1; then
            CURRENT_SELECTOR=$(kubectl -n demo get deployment demo-api -o json | \
              jq -cS '.spec.selector.matchLabels')
            echo "Current selector: $CURRENT_SELECTOR"
            echo "Desired selector: $DESIRED_SELECTOR"

            if [[ "$CURRENT_SELECTOR" != "$DESIRED_SELECTOR" ]]; then
              echo "::warning::Recreating demo-api because Deployment selectors are immutable"
              kubectl -n demo delete deployment demo-api --wait=true --timeout=3m
            fi
          fi

          kubectl apply -f "$RENDERED_MANIFEST"
          kubectl -n demo rollout status deployment/demo-api --timeout=5m
          kubectl -n demo get deployment,pods,service,hpa -l app=demo-api -o wide

      - name: Step 05.15 - Verify CODAP workloads
        run: |
          set -euo pipefail
          kubectl -n monitoring get pods,svc,pvc
          kubectl -n demo get pods,svc,hpa
          kubectl -n dora-metrics get pods,svc

      - name: Step 05.16 - Deployment summary
        run: |
          {
            echo "## CODAP Deployment Completed"
            echo ""
            echo "- Source SHA: $SOURCE_SHA"
            echo "- Image tag: $IMAGE_TAG"
            echo "- kube-prometheus-stack: $KUBE_PROMETHEUS_STACK_VERSION"
            echo "- EKS cluster: ${{ secrets.EKS_CLUSTER_NAME }}"
            echo "- Monitoring, demo and DORA metrics workloads are ready"
            echo "- Next workflow: 06 - Grafana Live"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Step 05.17 - Collect diagnostics after a failure
        if: ${{ failure() }}
        run: |
          bash scripts/collect-k8s-diagnostics.sh artifacts/deployment-diagnostics

      - name: Step 05.18 - Upload deployment diagnostics
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: codap-deployment-diagnostics-${{ github.run_id }}
          path: |
            artifacts/deployment-diagnostics/**
            artifacts/deployment-diagnostics.tar.gz
          if-no-files-found: ignore
          retention-days: 14

      - name: Step 05.19 - Trigger Grafana Live workflow
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref =
              context.payload.workflow_run?.head_branch ||
              context.ref.replace('refs/heads/', '');

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '06-grafana-live.yml',
              ref,
              inputs: {
                source_sha: process.env.SOURCE_SHA
              }
            });

            core.info(`Triggered 06 - Grafana Live on ${ref}`);
