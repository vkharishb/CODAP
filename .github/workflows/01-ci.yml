name: 01 - CODAP CI

on:
  workflow_run:
    workflows: ["00 - AWS Role Test"]
    types: [completed]
    branches:
      - main
      - devops
    
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Step 01 - Source, Docker, Terraform, Helm and Manifest Validation
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Step 01.01 - Checkout source code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}
          fetch-depth: 0

      - name: Step 01.02 - Show Linux runner details
        run: |
          uname -a
          cat /etc/os-release

      - name: Step 01.03 - Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo-app/package-lock.json

      - name: Step 01.04 - Install and validate demo app
        working-directory: demo-app
        run: |
          npm ci
          npm test --if-present
          PORT=8080 APP_ENV=ci APP_VERSION=${GITHUB_SHA} npm start > /tmp/codap-demo.log 2>&1 &
          sleep 5
          curl -fsS http://127.0.0.1:8080/health
          curl -fsS http://127.0.0.1:8080/metrics
          cat /tmp/codap-demo.log

      - name: Step 01.05 - Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Step 01.06 - Install and validate DORA metrics service
        working-directory: dora-metrics-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          PYTHONPATH=. CODAP_ENVIRONMENT=ci uvicorn app.main:app --host 127.0.0.1 --port 9000 > /tmp/codap-dora.log 2>&1 &
          sleep 5
          curl -fsS http://127.0.0.1:9000/health
          curl -fsS http://127.0.0.1:9000/api/v1/dora/summary
          curl -fsS http://127.0.0.1:9000/metrics
          cat /tmp/codap-dora.log

      - name: Step 01.07 - Build demo app Docker image
        run: docker build -t codap-demo-api:ci ./demo-app

      - name: Step 01.08 - Build DORA metrics Docker image
        run: docker build -t codap-dora-metrics-service:ci ./dora-metrics-service

      - name: Step 01.09 - Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.5"

      - name: Step 01.10 - Terraform format check
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Step 01.11 - Terraform init without backend
        run: terraform -chdir=terraform/envs/dev init -backend=false

      - name: Step 01.12 - Terraform validate
        run: terraform -chdir=terraform/envs/dev validate

      - name: Step 01.13 - Setup Helm
        uses: azure/setup-helm@v4

      - name: Step 01.14 - Helm lint and render DORA chart
        run: |
          helm lint dora-metrics-service/chart
          helm template dora-metrics-service dora-metrics-service/chart > /tmp/dora-metrics-rendered.yaml
          test -s /tmp/dora-metrics-rendered.yaml

      - name: Step 01.15 - Install kubeconform
        run: |
          curl -L -o kubeconform.tar.gz https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Step 01.16 - Kubernetes manifest validation without cluster
        run: |
          kubeconform -summary -strict -ignore-missing-schemas gitops/manifests/demo/*.yaml
          kubeconform -summary -strict -ignore-missing-schemas gitops/manifests/dora-metrics/*.yaml || true
          kubeconform -summary -strict -ignore-missing-schemas gitops/manifests/observability-dashboards/*.yaml
          kubeconform -summary -strict -ignore-missing-schemas /tmp/dora-metrics-rendered.yaml

      - name: Step 01.17 - CI summary
        run: |
          {
            echo "## CODAP CI Passed"
            echo ""
            echo "- Demo app validated"
            echo "- DORA metrics service validated"
            echo "- Docker builds passed"
            echo "- Terraform fmt/init/validate passed"
            echo "- Helm lint/template passed"
            echo "- Kubernetes manifests validated without cluster"
          } >> "$GITHUB_STEP_SUMMARY"