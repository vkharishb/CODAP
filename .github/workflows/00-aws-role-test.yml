name: 00 - AWS Role Test

on:
  push:
    branches:
      - main
      - devops
    paths:
      - "demo-app/**"
      - "dora-metrics-service/**"
      - "terraform/**"
      - "gitops/**"
      - "observability/**"
      - ".github/workflows/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  aws-role-test:
    name: Step 00 - Test AWS Credentials
    runs-on: ubuntu-latest

    steps:
      - name: Step 00.01 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-aws-role-test
          mask-aws-account-id: true

      - name: Step 00.02 - Verify AWS identity
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"
          aws sts get-caller-identity
          aws configure list