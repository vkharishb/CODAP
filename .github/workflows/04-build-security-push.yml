name: 04 - Build Security Push

on:
  workflow_run:
    workflows: ["03 - Terraform Apply"]
    types: [completed]
    branches:
      - main
      - devops
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: write

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  DEMO_REPO: codap-demo-api
  DORA_REPO: codap-dora-metrics-service
  SOURCE_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
  SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
  SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}


jobs:
  build-security-push:
    name: Step 04 - CI, Coverage, SonarQube, OWASP, Trivy, Build and ECR Push
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

    steps:
      - name: Step 04.01 - Checkout source code from triggering commit
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha || github.ref }}

      - name: Step 04.02 - Prepare source SHA and image tag
        run: |
          uname -a
          cat /etc/os-release

          SOURCE_SHA="${SOURCE_SHA:-$GITHUB_SHA}"
          SHORT_SHA="${SOURCE_SHA:0:12}"
          IMAGE_TAG="run-${GITHUB_RUN_ID}-${SHORT_SHA}"

          echo "SOURCE_SHA=$SOURCE_SHA" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          echo "Source SHA: $SOURCE_SHA"
          echo "Image tag: $IMAGE_TAG"

      - name: Step 04.03 - Setup Node.js for demo app
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo-app/package-lock.json

      - name: Step 04.04 - Install demo app dependencies
        working-directory: demo-app
        run: npm ci

      - name: Step 04.05 - Run demo app tests and coverage
        working-directory: demo-app
        run: |
          mkdir -p coverage
          if npm run | grep -q " test"; then
            npm test -- --coverage || npm test
          else
            echo "No npm test script found. Skipping demo-app unit tests."
          fi

      - name: Step 04.06 - Runtime smoke test demo app
        working-directory: demo-app
        run: |
          PORT=8080 APP_ENV=ci APP_VERSION="$IMAGE_TAG" npm start > /tmp/codap-demo.log 2>&1 &
          sleep 5
          curl -fsS http://127.0.0.1:8080/health
          curl -fsS http://127.0.0.1:8080/metrics
          cat /tmp/codap-demo.log

      - name: Step 04.07 - Setup Python for DORA metrics service
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Step 04.08 - Install DORA service dependencies
        working-directory: dora-metrics-service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Step 04.09 - Run DORA service tests and coverage
        working-directory: dora-metrics-service
        run: |
          if [ -d "tests" ]; then
            PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-report=term-missing
          else
            echo "No Python tests folder found. Creating placeholder coverage folder."
            mkdir -p coverage
          fi

      - name: Step 04.10 - Runtime smoke test DORA service
        working-directory: dora-metrics-service
        run: |
          PYTHONPATH=. CODAP_ENVIRONMENT=ci uvicorn app.main:app --host 127.0.0.1 --port 9000 > /tmp/codap-dora.log 2>&1 &
          sleep 5
          curl -fsS http://127.0.0.1:9000/health
          curl -fsS http://127.0.0.1:9000/api/v1/dora/summary
          curl -fsS http://127.0.0.1:9000/metrics
          cat /tmp/codap-dora.log

      - name: Step 04.11 - Prepare SonarQube project properties
        env:
          SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY || 'vkharishb_CODAP' }}
        run: |
          SONAR_KEY="$SONAR_PROJECT_KEY"

          cat > sonar-project.properties <<EOF_SONAR
          sonar.projectKey=$SONAR_KEY
          sonar.projectName=CODAP
          sonar.sources=demo-app,dora-metrics-service,gitops,terraform,observability
          sonar.exclusions=**/node_modules/**,**/.venv/**,**/coverage/**,**/.terraform/**,reports/**
          sonar.javascript.lcov.reportPaths=demo-app/coverage/lcov.info
          sonar.python.coverage.reportPaths=dora-metrics-service/coverage.xml
          EOF_SONAR

          if [ -n "$SONAR_ORGANIZATION" ]; then
            echo "sonar.organization=$SONAR_ORGANIZATION" >> sonar-project.properties
          fi

      - name: Step 04.12 - SonarQube code quality and coverage scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}

      - name: Step 04.12A - Skip SonarQube when token or host URL is missing
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: echo "SONAR_TOKEN or SONAR_HOST_URL is not configured. Skipping SonarQube scan."

      - name: Step 04.13 - Prepare vulnerability report folders
        run: |
          mkdir -p reports/owasp reports/trivy

      - name: Step 04.14 - OWASP Dependency-Check open-source vulnerability scan
        timeout-minutes: 45
        continue-on-error: true
        run: |
          NVD_ARGS=()

          if [ -n "${NVD_API_KEY:-}" ]; then
            echo "NVD_API_KEY is configured. OWASP scan will use authenticated NVD access."
            NVD_ARGS+=(--nvdApiKey "$NVD_API_KEY")
            NVD_ARGS+=(--nvdApiDelay 3500)
          else
            echo "NVD_API_KEY is not configured. OWASP scan will use public NVD access."
            NVD_ARGS+=(--nvdApiDelay 8000)
          fi

          docker run --rm \
            -v "$PWD":/src \
            owasp/dependency-check:latest \
            --project "CODAP" \
            --scan /src/demo-app \
            --scan /src/dora-metrics-service \
            --scan /src/gitops \
            --scan /src/terraform \
            --scan /src/observability \
            --out /src/reports/owasp \
            --format HTML \
            --format JSON \
            --disableAssembly \
            "${NVD_ARGS[@]}"

      - name: Step 04.15 - Trivy filesystem and IaC vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          output: reports/trivy/trivy-fs-iac-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Step 04.16 - Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ secrets.AWS_REGION }}
          role-session-name: codap-build-security-push
          mask-aws-account-id: true

      - name: Step 04.17 - Get AWS account and prepare ECR image URIs
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "::add-mask::$ACCOUNT_ID"

          DEMO_IMAGE="$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.DEMO_REPO }}:$IMAGE_TAG"
          DORA_IMAGE="$ACCOUNT_ID.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/${{ env.DORA_REPO }}:$IMAGE_TAG"

          echo "::add-mask::$DEMO_IMAGE"
          echo "::add-mask::$DORA_IMAGE"

          echo "account_id=$ACCOUNT_ID" >> "$GITHUB_OUTPUT"
          echo "DEMO_IMAGE=$DEMO_IMAGE" >> "$GITHUB_ENV"
          echo "DORA_IMAGE=$DORA_IMAGE" >> "$GITHUB_ENV"

      - name: Step 04.18 - Create ECR repositories if missing
        run: |
          aws ecr describe-repositories --repository-names "${{ env.DEMO_REPO }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.DEMO_REPO }}"

          aws ecr describe-repositories --repository-names "${{ env.DORA_REPO }}" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "${{ env.DORA_REPO }}"

      - name: Step 04.19 - Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "${{ secrets.AWS_REGION }}" | \
          docker login --username AWS --password-stdin \
          "${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com"

      - name: Step 04.20 - Build demo app Docker image
        run: docker build -t "$DEMO_IMAGE" ./demo-app

      - name: Step 04.21 - Build DORA metrics Docker image
        run: docker build -t "$DORA_IMAGE" ./dora-metrics-service

      - name: Step 04.22 - Trivy demo image vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.DEMO_IMAGE }}"
          format: table
          output: reports/trivy/trivy-demo-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Step 04.23 - Trivy DORA image vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: "${{ env.DORA_IMAGE }}"
          format: table
          output: reports/trivy/trivy-dora-image-report.txt
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "0"

      - name: Step 04.24 - Push Docker images to ECR
        run: |
          docker push "$DEMO_IMAGE"
          docker push "$DORA_IMAGE"

      - name: Step 04.25 - Write image metadata artifact
        run: |
          mkdir -p artifacts
          {
            echo "IMAGE_TAG=$IMAGE_TAG"
            echo "SOURCE_SHA=$SOURCE_SHA"
            echo "GITHUB_WORKFLOW_RUN_ID=${{ github.run_id }}"
            echo "GITHUB_WORKFLOW_RUN_ATTEMPT=${{ github.run_attempt }}"
            echo "DEMO_REPO=${{ env.DEMO_REPO }}"
            echo "DORA_REPO=${{ env.DORA_REPO }}"
            echo "AWS_REGION=${{ secrets.AWS_REGION }}"
          } > artifacts/image-metadata.env

      - name: Step 04.26 - Upload coverage and vulnerability reports
        uses: actions/upload-artifact@v4
        with:
          name: codap-coverage-vulnerability-reports
          path: |
            demo-app/coverage/**
            dora-metrics-service/coverage.xml
            reports/**
          if-no-files-found: ignore

      - name: Step 04.27 - Upload image metadata
        uses: actions/upload-artifact@v4
        with:
          name: codap-image-metadata
          path: artifacts/image-metadata.env

      - name: Step 04.28 - Build security push summary
        run: |
          {
            echo "## CODAP Build Security Push Completed"
            echo ""
            echo "- Demo app tests and smoke test completed"
            echo "- DORA service tests and smoke test completed"
            echo "- SonarQube scan executed if SONAR_TOKEN is configured"
            echo "- OWASP Dependency-Check open-source vulnerability report generated"
            echo "- Trivy filesystem, IaC and Docker image scans completed"
            echo "- Docker images pushed to ECR"
            echo "- Image tag: $IMAGE_TAG"
            echo "- Source SHA: $SOURCE_SHA"
            echo "- Build workflow run ID: ${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Step 04.29 - Trigger Deploy Application workflow
        if: ${{ success() }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ref =
              context.payload.workflow_run?.head_branch ||
              context.ref.replace('refs/heads/', '');

            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: '05-deploy-application.yml',
              ref,
              inputs: {
                build_run_id: String(context.runId),
                source_sha: process.env.SOURCE_SHA,
                image_tag: process.env.IMAGE_TAG
              }
            });

            core.info(`Triggered 05 - Deploy Application on ${ref}`);