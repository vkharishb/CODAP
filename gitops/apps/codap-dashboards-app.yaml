apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: codap-dashboards
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: codap
  source:
    repoURL: https://github.com/<your-github-username>/CODAP.git
    targetRevision: main
    path: gitops/manifests/observability-dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
