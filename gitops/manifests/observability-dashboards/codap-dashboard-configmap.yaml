apiVersion: v1
kind: ConfigMap
metadata:
  name: codap-grafana-dashboards
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
    app.kubernetes.io/part-of: codap
data:
  codap-deployment-analytics-dashboard.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [
        {
          "title": "CODAP README",
          "type": "link",
          "url": "https://github.com/<your-github-username>/CODAP"
        }
      ],
      "panels": [
        {
          "id": 1,
          "type": "barchart",
          "title": "Deployment Frequency",
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 8,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (application, environment, status) (increase(codap_deployments_total[$__range]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Average Lead Time",
          "gridPos": {
            "x": 8,
            "y": 0,
            "w": 8,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "avg by (application, environment) (rate(codap_lead_time_seconds_sum[$__range]) / rate(codap_lead_time_seconds_count[$__range]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 3,
          "type": "gauge",
          "title": "Change Failure Rate %",
          "gridPos": {
            "x": 16,
            "y": 0,
            "w": 8,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "100 * sum by (application, environment) (increase(codap_change_failures_total[$__range])) / sum by (application, environment) (increase(codap_deployments_total[$__range]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "MTTR",
          "gridPos": {
            "x": 0,
            "y": 6,
            "w": 8,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "avg by (application, environment) (rate(codap_mttr_seconds_sum[$__range]) / rate(codap_mttr_seconds_count[$__range]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 5,
          "type": "timeseries",
          "title": "Demo API Request Rate",
          "gridPos": {
            "x": 8,
            "y": 6,
            "w": 8,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (environment, version) (rate(codap_demo_http_requests_total[$__rate_interval]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 6,
          "type": "barchart",
          "title": "Pod Restarts - Demo Namespace",
          "gridPos": {
            "x": 16,
            "y": 6,
            "w": 8,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (pod) (increase(kube_pod_container_status_restarts_total{namespace=\"demo\"}[$__range]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "CPU Usage - Demo Namespace",
          "gridPos": {
            "x": 0,
            "y": 12,
            "w": 12,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (pod) (rate(container_cpu_usage_seconds_total{namespace=\"demo\",container!=\"\"}[$__rate_interval]))",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cores"
            },
            "overrides": []
          },
          "options": {}
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Memory Usage - Demo Namespace",
          "gridPos": {
            "x": 12,
            "y": 12,
            "w": 12,
            "h": 6
          },
          "datasource": {
            "type": "prometheus",
            "uid": "${DS_PROMETHEUS}"
          },
          "targets": [
            {
              "expr": "sum by (pod) (container_memory_working_set_bytes{namespace=\"demo\",container!=\"\"})",
              "legendFormat": "{{application}} {{environment}} {{status}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            },
            "overrides": []
          },
          "options": {}
        }
      ],
      "refresh": "30s",
      "schemaVersion": 39,
      "tags": [
        "codap",
        "dora",
        "eks",
        "deployment-analytics"
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "query": "prometheus",
            "current": {
              "text": "Prometheus",
              "value": "prometheus"
            }
          },
          {
            "name": "namespace",
            "type": "query",
            "datasource": {
              "type": "prometheus",
              "uid": "${DS_PROMETHEUS}"
            },
            "query": "label_values(kube_pod_info, namespace)",
            "refresh": 1,
            "current": {
              "text": "demo",
              "value": "demo"
            }
          }
        ]
      },
      "time": {
        "from": "now-6h",
        "to": "now"
      },
      "timezone": "browser",
      "title": "CODAP - Deployment Analytics & EKS Observability",
      "uid": "codap-deployment-analytics",
      "version": 1
    }
