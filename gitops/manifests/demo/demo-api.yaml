apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-api
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: codap
    app.kubernetes.io/component: workload
    codap.io/application: demo-api
    codap.io/environment: dev
spec:
  replicas: 2
  revisionHistoryLimit: 5
  # Keep the immutable selector compatible with the original CODAP deployment.
  # Standard Kubernetes recommended labels remain on the Pod template below.
  selector:
    matchLabels:
      app: demo-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: demo-api
        app.kubernetes.io/name: demo-api
        app.kubernetes.io/part-of: codap
        app.kubernetes.io/component: workload
        codap.io/application: demo-api
        codap.io/environment: dev
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8080"
        codap.io/dashboard-uid: "codap-deployment-analytics"
    spec:
      serviceAccountName: demo-app
      containers:
        - name: demo-api
          image: codap-demo-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: APP_ENV
              value: dev
            - name: APP_VERSION
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['pod-template-hash']
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: demo-api
  namespace: demo
  labels:
    app.kubernetes.io/name: demo-api
    app.kubernetes.io/part-of: codap
    codap.io/application: demo-api
  annotations:
    codap.io/dashboard-uid: "codap-deployment-analytics"
spec:
  selector:
    app: demo-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: demo-api
  namespace: demo
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: demo-api
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
