prometheus:
  prometheusSpec:
    retention: 7d
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        memory: 1Gi
    additionalScrapeConfigs:
      - job_name: annotated-pods
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: "(.+)"
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: "([^:]+)(?::\\d+)?;(\\d+)"
            replacement: "$1:$2"
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod

grafana:
  service:
    type: ClusterIP
    port: 80
  # Let the Grafana chart generate and store the admin password in the
  # observability-grafana Kubernetes Secret. Do not commit a static password.
  defaultDashboardsTimezone: browser
  persistence:
    enabled: true
    storageClassName: gp3
    size: 2Gi
  # The sidecar watches labelled ConfigMaps and loads dashboards dynamically.
  # Do not combine this with dashboardProviders/dashboardsConfigMaps: those
  # options mount an existing ConfigMap and can block Grafana startup when the
  # ConfigMap is created after the Helm release.
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      folder: /tmp/dashboards
      searchNamespace: monitoring

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        cpu: 50m
        memory: 64Mi

kube-state-metrics:
  enabled: true

nodeExporter:
  enabled: true
