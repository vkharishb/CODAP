version: 0.2

env:
  variables:
    AWS_REGION: ap-south-2
    DEMO_REPOSITORY: codap-demo-app
    DORA_REPOSITORY: codap-dora-metrics-service

phases:
  install:
    on-failure: ABORT
    commands:
      - echo "Checking build environment"
      - aws --version
      - docker --version
      - pwd
      - find . -maxdepth 3 -type f -name Dockerfile -print

  pre_build:
    on-failure: ABORT
    commands:
      - echo "Preparing ECR configuration"
      - ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
      - ECR_REGISTRY=$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com
      - IMAGE_TAG=$(echo "$CODEBUILD_RESOLVED_SOURCE_VERSION" | cut -c 1-12)
      - DEMO_IMAGE=$ECR_REGISTRY/$DEMO_REPOSITORY:$IMAGE_TAG
      - DORA_IMAGE=$ECR_REGISTRY/$DORA_REPOSITORY:$IMAGE_TAG
      - 'echo "Demo image: $DEMO_IMAGE"'
      - 'echo "DORA image: $DORA_IMAGE"'
      - test -f demo-app/Dockerfile
      - test -f dora-metrics-service/Dockerfile
      - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

  build:
    on-failure: ABORT
    commands:
      - echo "Building demo application image"
      - docker build --file demo-app/Dockerfile --tag "$DEMO_IMAGE" demo-app

      - echo "Building DORA metrics service image"
      - docker build --file dora-metrics-service/Dockerfile --tag "$DORA_IMAGE" dora-metrics-service

      - echo "Docker images built successfully"
      - docker images

  post_build:
    commands:
      - |
        if [ "$CODEBUILD_BUILD_SUCCEEDING" -eq 1 ]; then
          echo "Pushing demo application image"
          docker push "$DEMO_IMAGE"

          echo "Pushing DORA metrics service image"
          docker push "$DORA_IMAGE"

          echo "Both images pushed successfully"
        else
          echo "Build failed; skipping ECR push"
          exit 1
        fi